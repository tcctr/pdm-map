<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PDM Sintra-Cascais</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ---- Top bar ---- */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(15, 15, 30, 0.88);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    /* ---- Search ---- */
    #search-wrap {
      position: relative;
      flex: 1;
    }

    #search-input {
      width: 100%;
      padding: 7px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.35); }
    #search-input:focus {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
    }

    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: rgba(15, 15, 30, 0.97);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      overflow: hidden;
      z-index: 2000;
      display: none;
    }
    #search-results.open { display: block; }

    .search-result-item {
      padding: 9px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      line-height: 1.4;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255,255,255,0.08); }
    .search-result-item.no-results {
      color: rgba(255,255,255,0.4);
      cursor: default;
      font-style: italic;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 16px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.18); }

    /* ---- Status bar ---- */
    #statusbar {
      position: fixed;
      top: 56px; left: 0; right: 0;
      z-index: 999;
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(15, 15, 30, 0.75);
      backdrop-filter: blur(6px);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #statusbar::-webkit-scrollbar { display: none; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .status-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .chip-loading { background: rgba(255,193,7,0.15); color: #ffc107; }
    .chip-loading .dot { background: #ffc107; animation: pulse 1s infinite; }
    .chip-ok { background: rgba(40,167,69,0.15); color: #28a745; }
    .chip-ok .dot { background: #28a745; }
    .chip-warn { background: rgba(255,193,7,0.15); color: #ffc107; }
    .chip-warn .dot { background: #ffc107; }
    .chip-error { background: rgba(220,53,69,0.15); color: #dc3545; }
    .chip-error .dot { background: #dc3545; }
    .chip-gps { background: rgba(66,153,225,0.15); color: #4299e1; }
    .chip-gps .dot { background: #4299e1; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ---- Legend panel ---- */
    #legend {
      position: fixed;
      right: 10px;
      top: 120px;
      z-index: 1000;
      background: rgba(15, 15, 30, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      width: 230px;
      max-height: calc(100vh - 200px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: width 0.2s, max-height 0.2s;
    }

    #legend.collapsed {
      width: 44px;
      max-height: 44px;
    }

    #legend-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    #legend-header span {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
    }

    #legend-toggle {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      flex-shrink: 0;
    }

    #legend.collapsed #legend-header span,
    #legend.collapsed #legend-toggle { display: none; }

    #legend-body {
      overflow-y: auto;
      padding: 0 12px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    #legend.collapsed #legend-body { display: none; }

    .legend-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.4);
      margin: 10px 0 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .legend-swatch {
      width: 16px; height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .legend-label {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
    }

    /* ---- Detail bottom sheet ---- */
    #detail-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2000;
      background: rgba(15, 15, 30, 0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 55vh;
      display: flex;
      flex-direction: column;
    }

    #detail-panel.open {
      transform: translateY(0);
    }

    #detail-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    #detail-close {
      position: absolute;
      top: 10px; right: 14px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #detail-content {
      overflow-y: auto;
      padding: 14px 16px 20px;
      scrollbar-width: thin;
    }

    #detail-cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #detail-cat-badge .swatch {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    #detail-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    #detail-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 14px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .detail-row-value {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
    }

    /* ---- Doc buttons ---- */
    .doc-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .doc-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      transition: background 0.15s;
    }
    .doc-btn:hover { background: rgba(255,255,255,0.11); }

    .doc-btn-left { display: flex; flex-direction: column; gap: 2px; }
    .doc-btn-title { font-size: 13px; font-weight: 600; }
    .doc-btn-page { font-size: 11px; color: rgba(255,255,255,0.45); }
    .doc-btn-arrow { font-size: 16px; color: rgba(255,255,255,0.4); flex-shrink: 0; }

    /* ---- GPS accuracy circle overrides ---- */
    .gps-dot {
      background: #4299e1;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(66,153,225,0.5);
    }

    /* ---- Locate button ---- */
    #locate-btn {
      position: fixed;
      bottom: 24px;
      right: 14px;
      z-index: 1000;
      width: 44px; height: 44px;
      background: rgba(15, 15, 30, 0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #4299e1;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
    }
    #locate-btn:hover { background: rgba(30, 30, 60, 0.95); }

    /* ---- Left panel column ---- */
    #left-panels {
      position: fixed;
      left: 10px;
      top: 120px;
      z-index: 1000;
      width: 200px;
    }

    /* ---- Layer selector panel (liquid glass) ---- */
    #overlay-panel {
      background: rgba(10,10,20,0.62);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 46px;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    #overlay-panel.expanded { max-height: 70vh; }

    #overlay-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    #overlay-header > span {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      flex: 1;
      letter-spacing: 0.1px;
    }
    #overlay-toggle {
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      flex-shrink: 0;
    }
    #overlay-body {
      overflow-y: auto;
      padding: 4px 8px 10px;
      scrollbar-width: none;
    }
    #overlay-body::-webkit-scrollbar { display: none; }

    .overlay-group-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.28);
      margin: 10px 4px 3px;
    }
    .overlay-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 8px;
      border-radius: 11px;
      margin-bottom: 1px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .overlay-item input[type=radio] { display: none; }
    .overlay-item:hover { background: rgba(255,255,255,0.05); }
    .overlay-item:has(input:checked) {
      background: rgba(255,255,255,0.09);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
    }
    .overlay-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.25);
      transition: box-shadow 0.15s;
    }
    .overlay-item:has(input:checked) .overlay-dot {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.55);
    }
    .overlay-name {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      line-height: 1.3;
      flex: 1;
      transition: color 0.15s;
    }
    .overlay-item:has(input:checked) .overlay-name {
      color: rgba(255,255,255,0.97);
      font-weight: 500;
    }
    .overlay-spinner {
      font-size: 13px;
      color: #ffc107;
      flex-shrink: 0;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Mobile adjustments ---- */
    @media (max-width: 480px) {
      #legend { right: 8px; width: 200px; }
      #legend.collapsed { width: 40px; }
      #left-panels { left: 8px; }
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      display: none; /* we use our own panel */
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Top bar -->
<div id="topbar">
  <h1>PDM Sintra-Cascais</h1>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Pesquisar morada…" autocomplete="off" />
    <div id="search-results"></div>
  </div>
  <div class="btn-icon" id="info-btn" title="Sobre">&#x2139;</div>
</div>

<!-- Status chips -->
<div id="statusbar">
  <div class="status-chip chip-loading" id="chip-sintra">
    <div class="dot"></div><span>Sintra</span>
  </div>
  <div class="status-chip chip-loading" id="chip-cascais">
    <div class="dot"></div><span>Cascais</span>
  </div>
  <div class="status-chip chip-loading" id="chip-gps">
    <div class="dot"></div><span>GPS</span>
  </div>
</div>

<!-- Left panel column -->
<div id="left-panels">
  <!-- Unified layer selector -->
  <div id="overlay-panel" class="expanded">
    <div id="overlay-header" onclick="toggleOverlayPanel()">
      <span>Camadas</span>
      <div id="overlay-toggle">&#9650;</div>
    </div>
    <div id="overlay-body"></div>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div id="legend-header" onclick="toggleLegend()">
    <span>&#x1F5FA; Legenda</span>
    <div id="legend-toggle">&#9650;</div>
  </div>
  <div id="legend-body">
    <div class="legend-section-title">Solo Urbano (Sintra)</div>
    <div id="legend-urban"></div>
    <div class="legend-section-title">Solo R&uacute;stico (Sintra)</div>
    <div id="legend-rural"></div>
    <div class="legend-section-title">Cascais</div>
    <div id="legend-cascais"></div>
  </div>
</div>

<!-- Detail bottom sheet -->
<div id="detail-panel">
  <div id="detail-handle"></div>
  <button id="detail-close" onclick="closeDetail()">&#x2715;</button>
  <div id="detail-content">
    <div id="detail-cat-badge">
      <div class="swatch" id="detail-swatch"></div>
      <span id="detail-cat-code"></span>
    </div>
    <div id="detail-title"></div>
    <div id="detail-sub"></div>
    <div id="detail-rows"></div>
  </div>
</div>

<!-- Locate button -->
<button id="locate-btn" onclick="locateUser()" title="Centrar no GPS">&#x2316;</button>

<!-- SVG hatch pattern definitions for overlay layers -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <pattern id="hatch-ran" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="rgba(180,120,50,0.22)"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#b47832" stroke-width="3" stroke-opacity="0.7"/>
    </pattern>
    <pattern id="hatch-risk-red" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="rgba(220,53,69,0.18)"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#dc3545" stroke-width="2.5" stroke-opacity="0.7"/>
    </pattern>
    <pattern id="hatch-risk-orange" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="rgba(224,120,0,0.18)"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#e07800" stroke-width="2.5" stroke-opacity="0.7"/>
    </pattern>
  </defs>
</svg>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Esri Leaflet (for Cascais dynamic map layer + identify) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================

const SINTRA_BASE        = 'https://sig.cm-sintra.pt/arcgis/rest/services/WMS_Inspire/WMS_PDM20_Ordenamento/MapServer';
const CASCAIS_BASE       = 'https://sig.aml.pt/arcgis/rest/services/PlaneamentoOrdenamento/pdm_revisao/MapServer';
const REN_RAN_BASE       = 'https://sig.cm-sintra.pt/arcgis/rest/services/WMS_Inspire/WMS_SRUP_REN_RAN/MapServer';
const CONDICIONANTES_BASE = 'https://sig.cm-sintra.pt/arcgis/rest/services/WMS_Inspire/WMS_PDM20_Condicionantes/MapServer';

const DEFAULT_CENTER = [38.75, -9.42];
const DEFAULT_ZOOM = 13;
const MIN_DATA_ZOOM = 12;

// Color palette for Sintra Urban zones (CAT field, layer 55)
const URBAN_COLORS = {
  UC:  { fill: '#e63946', label: 'Espa\u00e7o Central' },
  UHD: { fill: '#f4845f', label: 'Habitacional Dominante' },
  UHC: { fill: '#f4a261', label: 'Habitacional Complementar' },
  UBD: { fill: '#e9c46a', label: 'Baixa Densidade Urbana' },
  UAE: { fill: '#9b5de5', label: 'Atividades Econ\u00f3micas' },
  UT:  { fill: '#43aa8b', label: 'Uso Tur\u00edstico' },
  UE:  { fill: '#4895ef', label: 'Equipamentos' },
  UI:  { fill: '#adb5bd', label: 'Infraestruturas' },
  UV:  { fill: '#2d6a4f', label: 'Verde Urbano' },
};

// Color palette for Sintra Rural zones (Ord_Categ field, layer 54)
const RURAL_COLORS = {
  N:   { fill: '#1a9850', label: 'Espa\u00e7o Natural 1' },
  NF:  { fill: '#52b788', label: 'Espa\u00e7o Natural 2' },
  NA:  { fill: '#74c69d', label: 'Espa\u00e7o Natural 3' },
  F:   { fill: '#95d5b2', label: 'Espa\u00e7o Florestal 1' },
  FA:  { fill: '#b7e4c7', label: 'Espa\u00e7o Florestal 2' },
  A:   { fill: '#d4a017', label: 'Espa\u00e7o Agr\u00edcola' },
  EI:  { fill: '#f4a261', label: 'Equipamentos/Infraestrutura' },
  OT:  { fill: '#43aa8b', label: 'Ocupa\u00e7\u00e3o Tur\u00edstica' },
  I:   { fill: '#6a4c93', label: 'Atividades Industriais' },
  ER:  { fill: '#c77dff', label: 'Recursos Geol\u00f3gicos' },
  AR:  { fill: '#9e9e9e', label: 'Aglomerado Rural' },
};

// Color palette for Cascais zones (Categoria field, layer 2)
const CASCAIS_COLORS = {
  'Espa\u00e7o Canal':                        { fill: '#555555', label: 'Canal' },
  'Espa\u00e7o Central':                      { fill: '#c1121f', label: 'Central' },
  'Espa\u00e7o Natural':                      { fill: '#2d6a4f', label: 'Natural' },
  'Espa\u00e7o Residencial':                  { fill: '#f4845f', label: 'Residencial' },
  'Espa\u00e7o Verde':                        { fill: '#52b788', label: 'Verde' },
  'Espa\u00e7o de Aglomerados Rurais':        { fill: '#9e9e9e', label: 'Aglomerados Rurais' },
  'Espa\u00e7o de Atividades Econ\u00f3micas':         { fill: '#9b5de5', label: 'Atividades Econ\u00f3micas' },
  'Espa\u00e7o de Atividades Econ\u00f3micas Proposto':{ fill: '#c77dff', label: 'At. Econ. Proposto' },
  'Espa\u00e7o de Equipamento':               { fill: '#4895ef', label: 'Equipamento' },
  'Espa\u00e7o de Ocupa\u00e7\u00e3o Tur\u00edstica':  { fill: '#43aa8b', label: 'Ocupa\u00e7\u00e3o Tur\u00edstica' },
  'Espa\u00e7o de Recursos Geol\u00f3gicos':  { fill: '#c77dff', label: 'Recursos Geol\u00f3gicos' },
  'Espa\u00e7o de Uso Especial':              { fill: '#e9c46a', label: 'Uso Especial' },
  'Espa\u00e7o de Uso Especial Proposto':     { fill: '#ffe8a1', label: 'Uso Especial Proposto' },
  'PMOT em vigor':                            { fill: '#cccccc', label: 'PMOT em vigor' },
};

// Fire hazard classes → colors (PMDFCI CLASSE field)
const FIRE_COLORS = {
  'Muito baixa': '#ffffb2',

// ============================================================
// ARCGIS QUERY HELPERS
// ============================================================

async function fetchGeoJSONPage(url, offset, count = 1000) {
  const sep = url.includes('?') ? '&' : '?';
  const full = `${url}${sep}resultOffset=${offset}&resultRecordCount=${count}&f=geojson`;
  const res = await fetch(full, { signal: AbortSignal.timeout(30000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchAllFeatures(baseQueryUrl) {
  const features = [];
  let offset = 0;
  const pageSize = 1000;
  while (true) {
    const data = await fetchGeoJSONPage(baseQueryUrl, offset, pageSize);
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const batch = data.features || [];
    features.push(...batch);
    if (!data.exceededTransferLimit || batch.length === 0) break;
    offset += batch.length;
  }
  return features;
}

// ============================================================
// STYLE HELPERS
// ============================================================

function makeStyle(fill, opacity = 0.42) {
  return {
    fillColor: fill,
    fillOpacity: opacity,
    color: fill,
    weight: 1,
    opacity: 0.75,
  };
}

function getUrbanStyle(props) {
  const cat = props.CAT || '';
  const cfg = URBAN_COLORS[cat];
  return makeStyle(cfg ? cfg.fill : '#888888');
}

function getRuralStyle(props) {
  const cat = props.Ord_Categ || '';
  const cfg = RURAL_COLORS[cat];
  return makeStyle(cfg ? cfg.fill : '#888888');
}

function showDetail(props, colorCfg, codeLabel) {
  const panel = document.getElementById('detail-panel');

  document.getElementById('detail-swatch').style.background = colorCfg.fill;
  document.getElementById('detail-cat-badge').style.background = colorCfg.fill + '22';
  document.getElementById('detail-cat-badge').style.color = colorCfg.fill;
  document.getElementById('detail-cat-code').textContent = codeLabel;

  document.getElementById('detail-title').textContent =
    props.Descricao || props.Categoria || colorCfg.label || codeLabel;
  document.getElementById('detail-sub').textContent =
    props.Subcategor && props.Subcategor !== props.Categoria ? props.Subcategor : '';

  const rowsEl = document.getElementById('detail-rows');
  let html = '';

  // ── Metadata row ──
  const area = props.area_ha || props.Area_Ha;
  const metaItems = [];
  if (area) metaItems.push(`<strong>\u00c1rea:</strong> ${parseFloat(area).toFixed(2)} ha`);
  if (props.Classe) metaItems.push(`<strong>Classe:</strong> ${props.Classe}`);
  if (metaItems.length) {
    html += `<div class="detail-row" style="margin-bottom:14px"><div class="detail-row-value" style="color:rgba(255,255,255,0.5);font-size:12px">${metaItems.join(' &nbsp;·&nbsp; ')}</div></div>`;
  }

  //   { label: 'Guião',       url: props.Guiao,        page: props.Pag_Guiao },
  //   { label: 'Relatório',   url: props.Relatorio,    page: props.Pag_relatorio },
  // ].filter(d => d.url);

  rowsEl.innerHTML = html;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

document.getElementById('detail-panel').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('detail-panel').addEventListener('touchend', e => {

function setChip(id, state, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'status-chip chip-' + state;
  el.innerHTML = `<div class="dot"></div><span>${text}</span>`;
}

async function loadSintraUrban() {
  const queryUrl = `${SINTRA_BASE}/55/query?where=1%3D1&outFields=CAT%2CDescricao%2CRegulamento%2CPag_Regulamento%2CGuiao%2CPag_Guiao%2CRelatorio%2CPag_relatorio%2Carea_ha&outSR=4326`;
  sintraStatus.urban = 'loading'; updateSintraChip();
  try {
    const features = await fetchAllFeatures(queryUrl);
    const geojson = { type: 'FeatureCollection', features };
    L.geoJSON(geojson, {
      renderer,
      style: f => getUrbanStyle(f.properties),
      onEachFeature(feature, layer) {
        layer.on('click', e => {
          L.DomEvent.stopPropagation(e);
          const p = feature.properties;
          const cat = p.CAT || '';
          const cfg = URBAN_COLORS[cat] || { fill: '#888', label: cat };
          showDetail(p, cfg, cat + (cfg.label ? ' — ' + cfg.label : ''));
        });
      }
    }).addTo(urbanLayer);
    sintraStatus.urban = 'ok'; sintraStatus.urbanText = `Urbano (${features.length})`;
    updateSintraChip();
  } catch (e) {
    console.error('Sintra urban error:', e);
    sintraStatus.urban = 'error'; sintraStatus.urbanText = 'erro';
    updateSintraChip();
  }
}

async function loadSintraRural() {
  const queryUrl = `${SINTRA_BASE}/54/query?where=1%3D1&outFields=Ord_Categ%2CDescricao%2CRegulamento%2CPag_Regulamento%2CGuiao%2CPag_Guiao%2CRelatorio%2CPag_relatorio%2CArea_Ha&outSR=4326`;

// ============================================================
// GPS TRACKING
// ============================================================

let gpsMarker = null;
let gpsAccuracy = null;
let firstFix = true;

const gpsDotIcon = L.divIcon({
  className: '',
  html: '<div class="gps-dot" style="width:14px;height:14px"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
});

function onGpsSuccess(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  const latlng = [lat, lng];

  if (!gpsMarker) {
    gpsMarker = L.marker(latlng, { icon: gpsDotIcon, zIndexOffset: 500 }).addTo(map);
    gpsAccuracy = L.circle(latlng, { radius: acc, weight: 1, color: '#4299e1', fillColor: '#4299e1', fillOpacity: 0.08 }).addTo(map);
  } else {
    gpsMarker.setLatLng(latlng);
    gpsAccuracy.setLatLng(latlng).setRadius(acc);
  }

  if (firstFix) {
    map.setView(latlng, 15);
    firstFix = false;
  }

  setChip('chip-gps', 'gps', `GPS \u00b1${Math.round(acc)}m`);
}

function onGpsError(err) {
  setChip('chip-gps', 'error', 'GPS: ' + (err.code === 1 ? 'bloqueado' : 'erro'));
}

function startGPS() {
  if (!navigator.geolocation) {
    setChip('chip-gps', 'error', 'GPS: N/A');
    return;
  }
  setChip('chip-gps', 'loading', 'GPS…');
  navigator.geolocation.watchPosition(onGpsSuccess, onGpsError, {
    enableHighAccuracy: true,
    maximumAge: 5000,
    timeout: 15000,
  });
}

function locateUser() {
  if (gpsMarker) {
    map.setView(gpsMarker.getLatLng(), Math.max(map.getZoom(), 15));
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 15);
    }, onGpsError, { enableHighAccuracy: true, timeout: 10000 });
  }
}

// ── Active layer selection ────────────────────────────────────
let activeLayer = 'zoning';

function handleLayerSelect(value) {
  activeLayer = value;
  if (value === 'zoning') {
    // Deactivate all overlays
    for (const def of OVERLAY_DEFS) {
      ovlState[def.id].active = false;
      if (ovlState[def.id].leafletLayer) map.removeLayer(ovlState[def.id].leafletLayer);
    }
    updateLayerVisibility();
  } else {
    // Hide zoning
    [urbanLayer, ruralLayer, cascaisLayer].forEach(l => map.removeLayer(l));
    setChip('chip-sintra', 'error', 'Oculto');
    setChip('chip-cascais', 'error', 'Oculto');
    // Deactivate all other overlays, activate this one
    for (const def of OVERLAY_DEFS) {
      if (def.id === value) {
        ovlState[def.id].active = true;
        loadOverlay(def.id);
      } else {
        ovlState[def.id].active = false;
        if (ovlState[def.id].leafletLayer) map.removeLayer(ovlState[def.id].leafletLayer);
      }
    }
  }
}

// ── Sintra combined chip logic ──────────────────────────────
const sintraStatus = { urban: 'loading', urbanText: '', rural: 'loading', ruralText: '' };

function updateSintraChip() {
  const zoomed = map.getZoom() >= MIN_DATA_ZOOM;
  const on = activeLayer === 'zoning';

  [urbanLayer, ruralLayer].forEach(l => on && zoomed ? map.addLayer(l) : map.removeLayer(l));

  const chip = document.getElementById('chip-sintra');
  if (!chip) return;

  if (!on)     { setChip('chip-sintra', 'error', 'Oculto');   return; }
  if (!zoomed) { setChip('chip-sintra', 'error', 'Aproxime'); return; }

  const u = sintraStatus.urban;
  const r = sintraStatus.rural;

  let state, label;
  if (u === 'loading' || r === 'loading') { state = 'loading'; label = 'Sintra…'; }
  else if (u === 'ok' && r === 'ok')      { state = 'ok';      label = 'Sintra'; }
  else if (u === 'error' && r === 'error'){ state = 'error';   label = 'Sintra'; }
  else                                    { state = 'warn';    label = 'Sintra'; }

  setChip('chip-sintra', state, label);
}

// ── Layer visibility ─────────────────────────────────────────
const chipLoadedState = {};

function setChipLoaded(id, state, text) {
  chipLoadedState[id] = { state, text };
  setChip(id, state, text);
}

function updateLayerVisibility() {
  updateSintraChip();

  const zoomed = map.getZoom() >= MIN_DATA_ZOOM;
  const on = activeLayer === 'zoning';
  on && zoomed ? map.addLayer(cascaisLayer) : map.removeLayer(cascaisLayer);

  const el = document.getElementById('chip-cascais');
  if (!el || el.classList.contains('chip-loading')) return;
  if (!on)      setChip('chip-cascais', 'error', 'Oculto');
  else if (!zoomed) setChip('chip-cascais', 'error', 'Aproxime');
  else if (chipLoadedState['chip-cascais']) {
    setChip('chip-cascais', chipLoadedState['chip-cascais'].state, chipLoadedState['chip-cascais'].text);
  }
}

map.on('zoomend', updateLayerVisibility);

// ============================================================
// MAP CLICK — close panel, or identify Cascais zone
// ============================================================

map.on('click', e => {
  closeDetail();
  if (activeLayer === 'zoning' && cascaisReady && map.hasLayer(cascaisLayer)) {
    L.esri.identifyFeatures({ url: CASCAIS_BASE })
      .on(map).at(e.latlng).layers('visible:2').tolerance(2)
      .run((err, fc) => {
        if (err || !fc || !fc.features.length) return;
        const p = fc.features[0].properties;
        const cat = p.Categoria || '';
        const cfg = CASCAIS_COLORS[cat] || { fill: '#888888', label: cat };
        showDetail(p, cfg, cat);
      });
  } else if (activeLayer === 'incendio') {
    const def = OVERLAY_DEFS.find(d => d.id === 'incendio');
    L.esri.identifyFeatures({ url: CONDICIONANTES_BASE })
      .on(map).at(e.latlng).layers('visible:371').tolerance(3)
      .run((err, fc) => {
        if (err || !fc || !fc.features.length) return;
        showOverlayDetail(def, fc.features[0].properties);
      });
  }
});

// ============================================================
// ADDRESS SEARCH (Nominatim)
// ============================================================

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
let searchDebounce = null;
let searchMarker = null;

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if (q.length < 3) { closeSearch(); return; }
  searchDebounce = setTimeout(() => runSearch(q), 350);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSearch(); searchInput.blur(); }
});

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) closeSearch();
});

async function runSearch(q) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=pt&viewbox=-9.55,38.65,-9.30,38.85&bounded=0`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'pt' } });
    const data = await res.json();
    renderResults(data);
  } catch {
    renderResults([]);
  }
}

function renderResults(items) {
  if (items.length === 0) {
    searchResults.innerHTML = '<div class="search-result-item no-results">Sem resultados</div>';
  } else {
    searchResults.innerHTML = items.map((item, i) =>
      `<div class="search-result-item">${item.display_name}</div>`
    ).join('');
    searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
      el.addEventListener('click', () => selectResult(items[i]));
    });
  }
  searchResults.classList.add('open');
}

function selectResult(item) {
  closeSearch();
  searchInput.value = item.display_name.split(',')[0];

  const lat = parseFloat(item.lat);
  const lng = parseFloat(item.lon);

  if (searchMarker) searchMarker.remove();
  searchMarker = L.circleMarker([lat, lng], {
    radius: 7,
    color: '#fff',
    weight: 2,
    fillColor: '#f4845f',
    fillOpacity: 1,
  }).addTo(map);

  if (item.boundingbox) {
    const bb = item.boundingbox.map(Number);
    map.fitBounds([[bb[0], bb[2]], [bb[1], bb[3]]], { maxZoom: 17 });
  } else {
    map.setView([lat, lng], 16);
  }
}

function closeSearch() {
  searchResults.classList.remove('open');
  searchResults.innerHTML = '';
}

// ============================================================
// OVERLAY / CONDICIONANTES LAYERS
// ============================================================

// Per-layer runtime state
const ovlState = {};
for (const def of OVERLAY_DEFS) {
  ovlState[def.id] = { active: false, loaded: false, loading: false, leafletLayer: null };
}

function makeOverlayStyle(def) {
  if (def.hatch) {
    return { fillColor: `url(#${def.hatch})`, fillOpacity: 1, color: def.color, weight: 1.5, opacity: 0.85 };
  }
  return { fillColor: def.color, fillOpacity: def.fillOpacity ?? 0.35, color: def.color, weight: 1, opacity: 0.75 };
}

async function loadOverlay(id) {
  const def = OVERLAY_DEFS.find(d => d.id === id);
  const st = ovlState[id];
  if (st.loaded) { if (st.active) st.leafletLayer.addTo(map); return; }
  if (st.loading) return;
  st.loading = true;
  const spin = document.getElementById('ovl-spin-' + id);
  if (spin) spin.style.display = '';
  try {
    const leafletLayer = L.layerGroup();

    if (def.categorized === 'fire') {
      // Server-rendered tiles — no GeoJSON download, no client lag
      const dynLayer = L.esri.dynamicMapLayer({ url: def.server, layers: [def.layerId], opacity: 0.65 });
      dynLayer.addTo(leafletLayer);
      st.leafletLayer = leafletLayer;
      if (st.active) leafletLayer.addTo(map);
      dynLayer.once('load', () => {
        st.loaded = true; st.loading = false;
        if (spin) spin.style.display = 'none';
      });
      dynLayer.on('loaderror', () => { st.loading = false; if (spin) spin.style.display = 'none'; });
      return; // rest handled via events
    }

    // All other layers: GeoJSON with canvas renderer + server-side simplification
    const url = `${def.server}/${def.layerId}/query?where=1%3D1&outFields=*&outSR=4326&maxAllowableOffset=0.0001`;
    const features = await fetchAllFeatures(url);
    L.geoJSON({ type: 'FeatureCollection', features }, {
      renderer: overlayRenderer,
      style: () => makeOverlayStyle(def),
      filter: f => !!f.geometry,
      onEachFeature(feature, layer) {
        layer.on('click', e => {
          L.DomEvent.stopPropagation(e);
          showOverlayDetail(def, feature.properties);
        });
      },
    }).addTo(leafletLayer);
    st.leafletLayer = leafletLayer;
    st.loaded = true;
    st.loading = false;
    if (spin) spin.style.display = 'none';
    if (st.active) leafletLayer.addTo(map);
  } catch (e) {
    console.error('Overlay error [' + id + ']:', e);
    st.loading = false;
    if (spin) spin.style.display = 'none';
  }
}

function toggleOverlay(id, checked) {
  const st = ovlState[id];
  st.active = checked;
  if (checked) {
    loadOverlay(id);
  } else if (st.leafletLayer) {
    map.removeLayer(st.leafletLayer);
  }
}

function showOverlayDetail(def, props) {
  let fill = def.color;
  let code = def.name;
  if (def.categorized === 'fire') {
    const cl = props.CLASSE || '';
    fill = FIRE_COLORS[cl] || def.color;
    code = cl || def.name;
  }
  showDetail(props, { fill, label: def.name }, code);
}

function toggleOverlayPanel() {
  const panel = document.getElementById('overlay-panel');
  const expanded = panel.classList.toggle('expanded');
  document.getElementById('overlay-toggle').innerHTML = expanded ? '&#9650;' : '&#9660;';
}

function buildOverlayPanel() {
  const body = document.getElementById('overlay-body');
  const groups = [...new Set(OVERLAY_DEFS.map(d => d.group))];
  let html = `<label class="overlay-item">
    <input type="radio" name="active-layer" value="zoning" checked onchange="handleLayerSelect('zoning')" />
    <span class="overlay-dot" style="background:linear-gradient(135deg,#e63946 33%,#1a9850 33% 66%,#f4a261 66%)"></span>
    <span class="overlay-name">Qualifica\u00e7\u00e3o do Solo</span>
  </label>`;
  for (const grp of groups) {
    html += `<div class="overlay-group-title">${grp}</div>`;
    for (const def of OVERLAY_DEFS.filter(d => d.group === grp)) {
      const dotBg = def.hatch
        ? `background:repeating-linear-gradient(45deg,${def.color}66,${def.color}66 2px,transparent 2px,transparent 7px),${def.color}22`
        : `background:${def.color}`;
      html += `<label class="overlay-item">
        <input type="radio" name="active-layer" value="${def.id}" onchange="handleLayerSelect('${def.id}')" />
        <span class="overlay-dot" style="${dotBg}"></span>
        <span class="overlay-name">${def.name}</span>
        <span class="overlay-spinner" id="ovl-spin-${def.id}" style="display:none">&#x21BB;</span>
      </label>`;
    }
  }
  body.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================

buildOverlayPanel();
startGPS();
updateLayerVisibility();
loadSintraUrban();
loadSintraRural();
loadCascais();
</script>
</body>
